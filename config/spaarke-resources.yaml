$schema-doc: |
  Spaarke Resources Manifest — single source of truth for non-secret Azure / Dataverse /
  SharePoint Embedded resource information. Secrets live in Azure Key Vault, referenced
  by name (kv:SECRET-NAME) never by value. Update by hand; sync secrets to local file
  via scripts/Sync-LocalConfig.ps1.

# ============================================================================
# Lifecycle conventions
# ============================================================================
# Every resource entry may carry an optional `_meta:` block:
#   _meta:
#     status: active | deprecated | legacy | retired | planned
#     created: YYYY-MM-DD
#     retired: YYYY-MM-DD             # only if status != active
#     reason_retained: "..."          # why kept after retirement (archival)
#     history:
#       - YYYY-MM-DD: note
# Active resources may omit `_meta:` entirely (assumed: active, history unknown).
# Deprecated / legacy / retired resources MUST carry a `_meta:` block.

# ============================================================================
# Manifest changelog (top-level chronology of significant changes)
# ============================================================================
_changelog:
  - 2026-06-26:
      action: created
      summary: Consolidated 8 fragmented config/*.local.json files into single YAML manifest. First sync verified 6/8 KV references; 2 BFF/DV references corrected post-discovery via `az keyvault secret list`.
      author: Claude Code
  - 2026-05-24:
      action: migration
      summary: BFF dev migrated from Windows `spe-api-dev-67e2xz` to Linux `spaarke-bff-dev`. Old app preserved for stability window before decommission.
  - 2025-12-31:
      action: app_reg_consolidation
      summary: BFF + GitHub Actions OIDC consolidated under SDAP-BFF-SPE-API (`1e40baad-...`). Old `Spaarke DMS-SPE Dev 1` (`fd1325aa-...`) moved to deprecated.
  - 2025-09-22:
      action: created
      summary: SPE container type "Spaarke PAYGO 1" provisioned (`8a6ce34c-...`)

