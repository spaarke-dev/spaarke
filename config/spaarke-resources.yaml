# ============================================================================
# SharePoint Embedded (tenant-level, region eastus)
# ============================================================================

sharepoint_embedded:
  container_type_name: Spaarke PAYGO 1
  container_type_id: 8a6ce34c-6055-4681-8f87-2f4f9f921c06
  owning_app_id: 170c98e1-d486-4355-bcbe-170454e0207c # = app_registrations.code_page_client.client_id
