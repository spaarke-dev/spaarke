<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spaarke Custom Page</title>
    <style>
      /*
       * Canonical DataGrid Code Page CSS reset.
       * See docs/guides/DATAGRID-CODE-PAGE-HOST-CONTRACT.md §2.
       *
       * DO NOT remove or modify without reading the contract — the DataGrid
       * framework's chrome math depends on every rule below.
       */
      *, *::before, *::after {
        box-sizing: border-box;
      }
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        max-height: 100vh;
        overflow: hidden;
      }
      #root > div {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
