name: Insights Engine Eval Gate

# D-P16 eval-harness CI gate (task 070, Wave 8 Phase 1 acceptance).
#
# Triggers ONLY on PRs that touch Insights Engine paths so the gate
# gives fast, focused feedback without re-running on unrelated PRs.
# The main `sdap-ci.yml` workflow also runs these tests as part of the
# full `dotnet test` matrix — this workflow is a path-scoped early-feedback
# alias, not a redundant gate.
#
# Per SPEC §5.1 acceptance criterion: "Eval harness baseline (D-P16)
# runs golden dataset (10-15 tuples for predict-matter-cost); RAG-triad
# metrics computed; baseline pass at permissive Phase 1 thresholds".
#
# Per task 070 POML: groundedness >= 95% (not 100%), no insufficient
# miscalls beyond 1/15 (~7% tolerance), LLM-as-judge deferred to Phase 1.5.

on:
  pull_request:
    paths:
      - 'src/server/api/Sprk.Bff.Api/Services/Ai/Insights/**'
      - 'src/server/api/Sprk.Bff.Api/Services/Insights/**'
      - 'src/server/api/Sprk.Bff.Api/Models/Insights/**'
      - 'src/server/api/Sprk.Bff.Api/Api/Insights/**'
      - 'src/server/api/Sprk.Bff.Api/Services/Ai/PublicContracts/IInsightsAi.cs'
      - 'src/server/api/Sprk.Bff.Api/Services/Ai/PublicContracts/IObservationMirror.cs'
      - 'src/server/api/Sprk.Bff.Api/Models/Ai/PublicContracts/Insights*.cs'
      - 'src/server/api/Sprk.Bff.Api/Services/Jobs/Insights/**'
      - 'tests/unit/Sprk.Bff.Api.Tests/EndToEnd/Phase1SmokeTest.cs'
      - 'tests/unit/Sprk.Bff.Api.Tests/Eval/**'
      - 'tests/Insights/**'
      - '.github/workflows/insights-eval.yml'

permissions:
  contents: read
  pull-requests: write  # for surfacing eval report as PR comment in future

concurrency:
  group: insights-eval-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  insights-eval:
    name: Insights Eval Harness (Phase 1 acceptance gate)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore tests/unit/Sprk.Bff.Api.Tests/Sprk.Bff.Api.Tests.csproj --verbosity minimal

      - name: Build BFF API + test project
        run: dotnet build tests/unit/Sprk.Bff.Api.Tests/Sprk.Bff.Api.Tests.csproj --no-restore --verbosity minimal

      - name: SPEC §3.5.4 facade-boundary grep (forbidden imports in Zone B)
        shell: pwsh
        run: |
          # Per SPEC §5.1.1 and CLAUDE.md §3.5.4 — Zone B paths MUST NOT import AI internals.
          # The only allowed Zone-A surface for Zone B is Services/Ai/PublicContracts.
          $pattern = 'IChatClient|IOpenAiClient|IPlaybookService|PlaybookExecutionEngine|Microsoft\.Extensions\.AI|Microsoft\.SemanticKernel|using OpenAI|Azure\.AI\.OpenAI|Services\.Ai\.Chat|Services\.Ai\.Insights[^.P]|Services\.Ai\.Nodes'
          $paths = @(
            'src/server/api/Sprk.Bff.Api/Services/Insights',
            'src/server/api/Sprk.Bff.Api/Api/Insights',
            'src/server/api/Sprk.Bff.Api/Models/Insights'
          )
          $hits = @()
          foreach ($p in $paths) {
            if (Test-Path $p) {
              # Strict: only `using` directives (not XML doc `<see cref>` references).
              $matches = Select-String -Path "$p\**\*.cs" -Pattern "^using.*($pattern)" -ErrorAction SilentlyContinue
              if ($matches) { $hits += $matches }
            }
          }
          $consumerFiles = Get-ChildItem -Path 'src/server/api/Sprk.Bff.Api/Services/Jobs' -Filter 'SpeUploadConsumer*.cs' -Recurse -ErrorAction SilentlyContinue
          foreach ($f in $consumerFiles) {
            $matches = Select-String -Path $f.FullName -Pattern "^using.*($pattern)" -ErrorAction SilentlyContinue
            if ($matches) { $hits += $matches }
          }
          if ($hits.Count -gt 0) {
            Write-Error "SPEC §3.5.4 forbidden-imports grep FAILED. Zone B must consume AI only via Services/Ai/PublicContracts."
            $hits | ForEach-Object { Write-Host "  $($_.Path):$($_.LineNumber): $($_.Line)" }
            exit 1
          } else {
            Write-Host "SPEC §3.5.4 facade-boundary grep PASSED — zero forbidden imports."
          }

      - name: Run Phase 1 smoke test (CI-deterministic)
        run: |
          dotnet test tests/unit/Sprk.Bff.Api.Tests/Sprk.Bff.Api.Tests.csproj `
            --no-build `
            --filter "FullyQualifiedName~Phase1SmokeTest" `
            --logger trx --results-directory ./TestResults/smoke
        shell: pwsh

      - name: Run Insights Eval harness (golden dataset baseline)
        id: eval
        run: |
          dotnet test tests/unit/Sprk.Bff.Api.Tests/Sprk.Bff.Api.Tests.csproj `
            --no-build `
            --filter "FullyQualifiedName~PredictMatterCostEvalHarness" `
            --logger "trx;LogFileName=insights-eval.trx" `
            --logger "console;verbosity=detailed" `
            --results-directory ./TestResults/eval
        shell: pwsh

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: insights-eval-results
          path: |
            ./TestResults/smoke/
            ./TestResults/eval/
            tests/unit/Sprk.Bff.Api.Tests/bin/Debug/net8.0/Eval/reports/
          if-no-files-found: warn
