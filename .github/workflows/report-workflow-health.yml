name: report-workflow-health

# Per FR-11 + D-02: weekly CI health report (GitHub-issue-only; no Slack/Teams bridge).
# Queries the last 7 days of workflow runs, computes per-workflow success rates, then
# creates or appends to a single ongoing issue titled "CI Health Report". FR-14 measures
# rolling 7-day success rate; target is >=90% by project close.

on:
  schedule:
    - cron: '0 9 * * 1'  # Mondays 09:00 UTC (D-02, spec Assumption-1)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    name: rolling-7-day-health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build health snapshot
        id: snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          SINCE_DATE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          TODAY=$(date -u +%Y-%m-%d)
          NOW_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SNAPSHOT_FILE="health-snapshot-${TODAY}.md"

          {
            echo "# CI Health Snapshot - Week of ${TODAY}"
            echo ""
            echo "- **Generated:** ${NOW_UTC}"
            echo "- **Window:** last 7 days (since ${SINCE_DATE})"
            echo "- **Repository:** ${GITHUB_REPOSITORY}"
            echo ""
            echo "## Per-workflow success rate"
            echo ""
            echo "| Workflow | Total | Success | Failure | Skipped/Cancelled | Success rate |"
            echo "|---|---|---|---|---|---|"
          } > "$SNAPSHOT_FILE"

          TOTAL_RUNS=0
          TOTAL_SUCCESS=0
          TOTAL_FAILURE=0
          TOTAL_SKIPPED=0

          for wf in .github/workflows/*.yml; do
            wf_name=$(basename "$wf")
            # gh run list returns only completed runs by default when filtered with --status
            # We want all completed runs in the window, so we capture conclusion for each
            runs_json=$(gh run list \
              --workflow="$wf_name" \
              --created=">${SINCE_DATE}" \
              --limit 200 \
              --json conclusion,status 2>/dev/null || echo '[]')

            # Count only completed runs (status == completed); in_progress/queued have null conclusion
            total=$(echo "$runs_json" | jq '[.[] | select(.status == "completed")] | length')
            success=$(echo "$runs_json" | jq '[.[] | select(.conclusion == "success")] | length')
            failure=$(echo "$runs_json" | jq '[.[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "startup_failure")] | length')
            skipped=$(echo "$runs_json" | jq '[.[] | select(.conclusion == "skipped" or .conclusion == "cancelled" or .conclusion == "neutral")] | length')

            if [ "$total" -eq 0 ]; then
              rate="-"
            else
              rate=$(awk -v s="$success" -v t="$total" 'BEGIN { printf "%.1f%%", (s / t) * 100 }')
            fi

            echo "| ${wf_name} | ${total} | ${success} | ${failure} | ${skipped} | ${rate} |" >> "$SNAPSHOT_FILE"

            TOTAL_RUNS=$((TOTAL_RUNS + total))
            TOTAL_SUCCESS=$((TOTAL_SUCCESS + success))
            TOTAL_FAILURE=$((TOTAL_FAILURE + failure))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + skipped))
          done

          if [ "$TOTAL_RUNS" -gt 0 ]; then
            OVERALL=$(awk -v s="$TOTAL_SUCCESS" -v t="$TOTAL_RUNS" 'BEGIN { printf "%.1f%%", (s / t) * 100 }')
          else
            OVERALL="-"
          fi

          {
            echo ""
            echo "## Overall"
            echo ""
            echo "**Rolling 7-day success rate: ${OVERALL}** (FR-14 target: >=90%)"
            echo ""
            echo "- Total completed runs: ${TOTAL_RUNS}"
            echo "- Success: ${TOTAL_SUCCESS}"
            echo "- Failure: ${TOTAL_FAILURE}"
            echo "- Skipped / Cancelled / Neutral: ${TOTAL_SKIPPED}"
            echo ""
            echo "---"
            echo ""
            echo "_Generated by [report-workflow-health.yml](./.github/workflows/report-workflow-health.yml) per FR-11 + D-02._"
          } >> "$SNAPSHOT_FILE"

          echo "----- Snapshot preview -----"
          cat "$SNAPSHOT_FILE"
          echo "----- End preview -----"

          echo "snapshot_file=$SNAPSHOT_FILE" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Create or update CI Health Report issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAPSHOT_FILE: ${{ steps.snapshot.outputs.snapshot_file }}
          SNAPSHOT_DATE: ${{ steps.snapshot.outputs.today }}
        shell: bash
        run: |
          set -euo pipefail

          # Single ongoing issue per D-02 (NOT one issue per week).
          # Search by exact title via the search qualifier; pick the lowest-numbered open
          # match for determinism (in case duplicates were ever created manually).
          EXISTING=$(gh issue list \
            --state open \
            --search 'in:title "CI Health Report"' \
            --json number,title \
            --jq '[.[] | select(.title == "CI Health Report")] | sort_by(.number) | .[0].number // empty' \
            2>/dev/null || echo '')

          if [ -n "$EXISTING" ]; then
            echo "Appending weekly snapshot to existing issue #${EXISTING}"
            gh issue comment "$EXISTING" --body-file "$SNAPSHOT_FILE"
          else
            echo "No open 'CI Health Report' issue found; creating one."
            # Try with the ci-health label first; if the label doesn't exist in the repo,
            # fall back to creating without a label so the workflow still succeeds.
            if ! gh issue create \
                --title "CI Health Report" \
                --body-file "$SNAPSHOT_FILE" \
                --label "ci-health" 2>/dev/null; then
              echo "Label 'ci-health' not present; creating issue without label."
              gh issue create \
                --title "CI Health Report" \
                --body-file "$SNAPSHOT_FILE"
            fi
          fi
