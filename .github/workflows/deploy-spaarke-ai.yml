# ============================================================================
# deploy-spaarke-ai.yml — Build & Deploy SpaarkeAi Web Resource to Dataverse
# ============================================================================
#
# Triggers on push to master when SpaarkeAi code changes (spec FR-C05).
# Also supports manual dispatch for on-demand deployments to dev/production.
#
# Pipeline: build (npm) → smoke (bundle integrity) → deploy → verify
#
# Target:    Dataverse web resource `sprk_spaarkeai` (single-file HTML bundle
#            per ADR-026). SpaarkeAi is a Code Page, NOT an Azure App Service —
#            there is no slot-swap mechanism. The "staging" concept here is
#            environment separation (dev vs production), and rollback is via
#            re-running this workflow against a prior commit.
#
# Rollback:  Manual — re-dispatch the workflow with `ref` pointing at the
#            last-known-good commit SHA and target the impacted environment.
#            The deploy script is idempotent (PATCH-or-CREATE on web resource).
#
# Auth:      Azure CLI federated identity (OIDC). The Deploy-SpaarkeAi.ps1
#            script consumes `az account get-access-token` against the
#            Dataverse resource URL.
#
# Audit trail: All runs logged in GitHub Actions history.
# ============================================================================

name: Deploy SpaarkeAi

on:
  push:
    branches:
      - master
    paths:
      - 'src/solutions/SpaarkeAi/**'
      - 'src/client/shared/Spaarke.UI.Components/**'
      - 'src/client/shared/Spaarke.AI.Widgets/**'
      - 'src/client/shared/Spaarke.AI.Outputs/**'
      - 'src/client/shared/Spaarke.AI.Context/**'
      - 'src/client/shared/Spaarke.Events.Components/**'
      - 'src/client/shared/Spaarke.SmartTodo.Components/**'
      - 'src/client/shared/Spaarke.DailyBriefing.Components/**'
      - 'src/client/shared/Spaarke.Auth/**'
      - 'src/client/shared/Spaarke.SdapClient/**'
      - 'src/solutions/LegalWorkspace/**'
      - '.github/workflows/deploy-spaarke-ai.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - production
        default: 'dev'

permissions:
  contents: read
  id-token: write  # Required for OIDC-based Azure login

concurrency:
  group: deploy-spaarke-ai-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false  # Never cancel in-progress deployments

env:
  NODE_VERSION: '20'
  SOLUTION_DIR: src/solutions/SpaarkeAi
  BUNDLE_FILENAME: spaarkeai.html

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Build single-file HTML bundle (vite + singleFile plugin)
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build SpaarkeAi Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # NOTE: Per root CLAUDE.md "Avoid `npm ci` for Vite Solutions" — many
      # src/solutions/* have stale package-lock.json files. Use `npm install`
      # with the legacy-peer-deps flag to bypass deterministic-lock failures
      # without losing the cache.
      - name: Install dependencies
        working-directory: ${{ env.SOLUTION_DIR }}
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build (vite single-file)
        working-directory: ${{ env.SOLUTION_DIR }}
        run: npm run build

      - name: Verify bundle exists
        working-directory: ${{ env.SOLUTION_DIR }}
        run: |
          if [ ! -f "dist/${{ env.BUNDLE_FILENAME }}" ]; then
            echo "::error::Build artifact missing: dist/${{ env.BUNDLE_FILENAME }}"
            ls -la dist/ || true
            exit 1
          fi
          BUNDLE_SIZE=$(stat -c%s "dist/${{ env.BUNDLE_FILENAME }}")
          BUNDLE_SIZE_KB=$((BUNDLE_SIZE / 1024))
          echo "Bundle size: ${BUNDLE_SIZE_KB} KB"
          echo "BUNDLE_SIZE_KB=${BUNDLE_SIZE_KB}" >> $GITHUB_ENV

      - name: Bundle smoke test — required HTML/JS markers present
        working-directory: ${{ env.SOLUTION_DIR }}
        run: |
          BUNDLE="dist/${{ env.BUNDLE_FILENAME }}"
          echo "Smoke testing bundle for required markers..."

          # The build inlines all assets per vite-plugin-singlefile (ADR-026).
          # A healthy bundle must contain: <!DOCTYPE html>, a <script> tag with
          # the React entry, and reference the root mount element.
          fail=0

          if ! grep -q "<!DOCTYPE html>" "$BUNDLE"; then
            echo "::error::Missing <!DOCTYPE html> declaration"
            fail=1
          fi

          if ! grep -q "<script" "$BUNDLE"; then
            echo "::error::Missing inlined <script> tag"
            fail=1
          fi

          if ! grep -q 'id="root"' "$BUNDLE"; then
            echo "::error::Missing root mount element"
            fail=1
          fi

          # Per ADR-026 the bundle must be self-contained (no external CDN
          # references that would fail in Dataverse sandboxed iframe).
          if grep -qE 'src="https?://[^"]+\.(js|css)"' "$BUNDLE"; then
            echo "::error::Bundle references external scripts/css (ADR-026 violation)"
            grep -oE 'src="https?://[^"]+\.(js|css)"' "$BUNDLE" | head -5
            fail=1
          fi

          if [ "$fail" -eq 1 ]; then
            exit 1
          fi
          echo "Bundle smoke test passed (${BUNDLE_SIZE_KB} KB)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: spaarke-ai-bundle
          path: ${{ env.SOLUTION_DIR }}/dist/${{ env.BUNDLE_FILENAME }}
          retention-days: 7

      - name: Write build summary
        run: |
          echo "## SpaarkeAi Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle | \`${{ env.BUNDLE_FILENAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${BUNDLE_SIZE_KB} KB |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy to Dataverse dev environment
  #         - Always runs on master push (auto-deploy to dev)
  #         - Manual dispatch with environment=dev also targets here
  # ──────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dataverse (dev)
    runs-on: windows-latest  # Deploy-SpaarkeAi.ps1 uses a hard-coded Windows az.cmd path
    needs: build
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment: dev

    env:
      DATAVERSE_URL: https://spaarkedev1.crm.dynamics.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: spaarke-ai-bundle
          path: ${{ env.SOLUTION_DIR }}/dist

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy web resource to Dataverse
        shell: pwsh
        run: |
          ./scripts/Deploy-SpaarkeAi.ps1 -DataverseUrl '${{ env.DATAVERSE_URL }}'

      - name: Verify web resource is published
        shell: pwsh
        run: |
          $token = az account get-access-token --resource '${{ env.DATAVERSE_URL }}' --query accessToken -o tsv
          if (-not $token) { throw "Failed to acquire Dataverse access token" }

          $headers = @{
            Authorization = "Bearer $token"
            Accept = 'application/json'
            'OData-Version' = '4.0'
          }
          $uri = "${{ env.DATAVERSE_URL }}/api/data/v9.2/webresourceset?`$filter=name eq 'sprk_spaarkeai'&`$select=name,modifiedon,canbedeleted"
          $resp = Invoke-RestMethod -Uri $uri -Headers $headers -Method Get

          if ($resp.value.Count -ne 1) {
            throw "sprk_spaarkeai not found after deploy (count=$($resp.value.Count))"
          }
          Write-Host "Verified: sprk_spaarkeai (modified $($resp.value[0].modifiedon))"

      - name: Write deploy summary
        if: always()
        shell: pwsh
        run: |
          "## SpaarkeAi Dev Deploy" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Field | Value |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "|-------|-------|" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Environment | dev |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Target | ${{ env.DATAVERSE_URL }} |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Web resource | sprk_spaarkeai |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Commit | ``${{ github.sha }}`` |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Dataverse production (manual dispatch only, gated)
  #         - Requires `environment: production` reviewer approval
  #         - Never runs automatically on push (intentional — Dataverse
  #           web resources have no slot-swap rollback; production is a
  #           one-way push and must be human-gated).
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Dataverse (production)
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production  # Requires reviewer approval

    env:
      # TODO(spaarke-infra): replace with the production Dataverse URL once
      # the production tenant is provisioned. Until then, manual dispatch
      # to production is intentionally a no-op gate.
      DATAVERSE_URL: ${{ secrets.SPAARKE_DATAVERSE_PROD_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: spaarke-ai-bundle
          path: ${{ env.SOLUTION_DIR }}/dist

      - name: Validate production URL secret is configured
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace('${{ env.DATAVERSE_URL }}')) {
            Write-Error "Secret SPAARKE_DATAVERSE_PROD_URL is not configured. Configure it in the production environment before deploying."
            exit 1
          }

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy web resource to production Dataverse
        shell: pwsh
        run: |
          ./scripts/Deploy-SpaarkeAi.ps1 -DataverseUrl '${{ env.DATAVERSE_URL }}'

      - name: Verify production web resource is published
        shell: pwsh
        run: |
          $token = az account get-access-token --resource '${{ env.DATAVERSE_URL }}' --query accessToken -o tsv
          if (-not $token) { throw "Failed to acquire Dataverse access token" }

          $headers = @{
            Authorization = "Bearer $token"
            Accept = 'application/json'
            'OData-Version' = '4.0'
          }
          $uri = "${{ env.DATAVERSE_URL }}/api/data/v9.2/webresourceset?`$filter=name eq 'sprk_spaarkeai'&`$select=name,modifiedon"
          $resp = Invoke-RestMethod -Uri $uri -Headers $headers -Method Get

          if ($resp.value.Count -ne 1) {
            throw "sprk_spaarkeai not found in production after deploy (count=$($resp.value.Count))"
          }
          Write-Host "Verified production: sprk_spaarkeai (modified $($resp.value[0].modifiedon))"

      - name: Write production deploy summary
        if: always()
        shell: pwsh
        run: |
          "## SpaarkeAi Production Deploy" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Field | Value |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "|-------|-------|" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Environment | production |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Web resource | sprk_spaarkeai |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Commit | ``${{ github.sha }}`` |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Triggered by | ${{ github.actor }} |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

  # ──────────────────────────────────────────────────────────────────────────
  # Summary (always runs)
  # ──────────────────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build, deploy-dev, deploy-production]
    if: always()

    steps:
      - name: Write Summary
        run: |
          echo "## SpaarkeAi Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Dev | ${{ needs.deploy-dev.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
