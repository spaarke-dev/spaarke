# BISECT STEP 5 — add tier2 reusable workflow call (with fixed string-type inputs)
name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-router-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: Classify Diff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      bff: ${{ steps.filter.outputs.bff }}
      spaarke_ai: ${{ steps.filter.outputs.spaarke_ai }}
      docs: ${{ steps.filter.outputs.docs }}
      ci_workflows: ${{ steps.filter.outputs.ci_workflows }}
      docs_only: ${{ steps.docs-only-flag.outputs.value }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 1 || 0 }}
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            bff:
              - 'src/server/api/Sprk.Bff.Api/**'
              - 'src/server/shared/**'
            spaarke_ai:
              - 'src/solutions/SpaarkeAi/**'
            docs:
              - 'docs/**'
              - '**.md'
              - '.claude/**'
            ci_workflows:
              - '.github/workflows/**'
      - id: docs-only-flag
        shell: bash
        run: |
          if [[ "${{ steps.filter.outputs.docs }}" == "true" && "${{ steps.filter.outputs.bff }}" != "true" && "${{ steps.filter.outputs.spaarke_ai }}" != "true" && "${{ steps.filter.outputs.ci_workflows }}" != "true" ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

  tier1:
    name: Tier 1 (Blocking)
    needs: classify
    if: needs.classify.outputs.docs_only != 'true'
    uses: ./.github/workflows/ci-tier1-blocking.yml
    secrets: inherit
    with:
      bff_changed: ${{ needs.classify.outputs.bff }}
      spaarke_ai_changed: ${{ needs.classify.outputs.spaarke_ai }}

  tier2:
    name: Tier 2 (Advisory)
    needs: classify
    if: needs.classify.outputs.docs_only != 'true'
    uses: ./.github/workflows/ci-tier2-advisory.yml
    secrets: inherit
    with:
      run-lint: ${{ needs.classify.outputs.spaarke_ai == 'true' || needs.classify.outputs.bff == 'true' }}
      run-format: true
      run-unit-tests: ${{ needs.classify.outputs.bff == 'true' }}
      run-adr-compliance: true
      run-markdown: true
      run-last-reviewed: true
      run-plugin-size: ${{ needs.classify.outputs.bff == 'true' }}

  Router:
    name: Router
    if: always()
    needs: [classify, tier1, tier2]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          echo "classify=${{ needs.classify.result }} tier1=${{ needs.tier1.result }} tier2=${{ needs.tier2.result }}"
