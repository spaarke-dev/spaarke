# BISECT STEP 2 — add workflow-level config (merge_group + permissions + concurrency)
name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-router-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  Router:
    name: Router
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Bisect step 2 echo
        run: echo "BISECT STEP 2 — config block added (merge_group + permissions + concurrency)."
