# BISECT STEP 1 — absolute minimal router (CICD-086)
# If THIS fails with startup_failure, the issue is repo-state / permissions /
# something fundamental, not the router YAML itself. If it succeeds, we
# bisect upward by adding features back one push at a time.
name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  Router:
    name: Router
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Minimal echo
        run: echo "BISECT STEP 1 — minimal CI router. If you see this, the basic shell parses + runs."
