<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analysis Workspace</title>
  <!-- Inject SidePaneManager into parent Dataverse shell (registers SprkChat pane) -->
  <script>
  (function() {
      try {
          var parentDoc = window.parent && window.parent !== window && window.parent.document;
          if (!parentDoc) return;
          if (parentDoc.querySelector('script[data-sprk-sidepane]')) return;
          var s = parentDoc.createElement('script');
          s.src = '/WebResources/sprk_SidePaneManager';
          s.setAttribute('data-sprk-sidepane', 'true');
          parentDoc.head.appendChild(s);
      } catch (e) {
          console.warn('[SidePane] Could not inject into parent frame:', e);
      }
  })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* 100vh fills the iframe viewport in Dataverse dialogs; 100% alone does not */
    html, body { width: 100%; height: 100vh; overflow: hidden; }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="bundle.js"></script>
</body>
</html>
