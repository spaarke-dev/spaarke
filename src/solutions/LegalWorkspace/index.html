<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legal Workspace</title>
    <style>
      /* Reset for Dataverse iframe context — prevents double scrollbars and margin gaps */
      /* `box-sizing: border-box` is REQUIRED — without it, the DataGrid root's
         inner padding adds to the 100%-of-viewport size and the Calendar widget
         grid overflows the workspace section frame. Parity with sprk_invoicespage.
         Added 035-fix-iteration-3 (2026-06-03). */
      *, *::before, *::after {
        box-sizing: border-box;
      }
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      /* FluentProvider renders a wrapping div — ensure it fills the container */
      #root > div {
        height: 100%;
      }
      /* Hide scrollbars globally while preserving scroll behavior */
      * {
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE/Edge */
      }
      *::-webkit-scrollbar {
        display: none; /* Chrome/Safari */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
