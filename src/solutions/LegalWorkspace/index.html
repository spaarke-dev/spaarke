<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legal Workspace</title>
    <!-- Inject SidePaneManager into parent Dataverse shell (registers SprkChat pane) -->
    <script>
    (function() {
        try {
            var parentDoc = window.parent && window.parent !== window && window.parent.document;
            if (!parentDoc) return;
            if (parentDoc.querySelector('script[data-sprk-sidepane]')) return;
            var s = parentDoc.createElement('script');
            s.src = '/WebResources/sprk_SidePaneManager';
            s.setAttribute('data-sprk-sidepane', 'true');
            parentDoc.head.appendChild(s);
        } catch (e) {
            console.warn('[SidePane] Could not inject into parent frame:', e);
        }
    })();
    </script>
    <style>
      /* Reset for Dataverse iframe context — prevents double scrollbars and margin gaps */
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      /* FluentProvider renders a wrapping div — ensure it fills the container */
      #root > div {
        height: 100%;
      }
      /* Hide scrollbars globally while preserving scroll behavior */
      * {
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE/Edge */
      }
      *::-webkit-scrollbar {
        display: none; /* Chrome/Safari */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
