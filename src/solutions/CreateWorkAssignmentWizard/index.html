<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Work Assignment</title>
    <style>
      /* Box-sizing reset — REQUIRED per docs/guides/DATAGRID-CODE-PAGE-HOST-CONTRACT.md §2.
       * Wave 3 backfill 2026-06-10 — see projects/ai-spaarke-ai-workspace-UI-r1/
       * notes/box-sizing-reset-audit.md for the audit results and reasoning. */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      /* Reset styles for Dataverse modal dialog context */
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      /* Allow scroll but hide scrollbar chrome */
      #root {
        overflow: auto;
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE/Edge */
      }
      #root::-webkit-scrollbar {
        display: none; /* Chrome/Safari */
      }
      /* Ensure Fluent provider fills the container */
      #root > div {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
