<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoices - Budget Performance</title>
    <style>
      /* Reset styles for Dataverse Custom Page context */
      /* `box-sizing: border-box` is REQUIRED — without it, the DataGrid root's
         inner padding adds to the 100%-of-viewport width/height and the grid
         overflows the Power Apps modal frame on the right and bottom. */
      *, *::before, *::after {
        box-sizing: border-box;
      }
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      /* Ensure Fluent provider fills the container */
      #root > div {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
