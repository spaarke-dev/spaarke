<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Documents</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* 100vh fills the iframe viewport in Dataverse dialogs; 100% alone does not */
    html, body { width: 100%; height: 100vh; overflow: hidden; }
    #root { width: 100%; height: 100%; }
  </style>
  <script>
    /**
     * Theme detection — resolve Dataverse dark/light mode before React mounts.
     * Sets data-theme attribute on <html> for downstream FluentProvider selection.
     *
     * Priority:
     *   1. Xrm.Utility.getGlobalContext().getCurrentTheme() (Dataverse runtime)
     *   2. prefers-color-scheme media query (standalone / dev)
     */
    (function detectTheme() {
      // Priority 1: URL parameter from ribbon command (most reliable)
      try {
        var raw = new URLSearchParams(window.location.search);
        var dataParam = raw.get('data');
        var params = dataParam ? new URLSearchParams(decodeURIComponent(dataParam)) : raw;
        var urlTheme = params.get('theme');
        if (urlTheme === 'dark' || urlTheme === 'light') {
          document.documentElement.setAttribute('data-theme', urlTheme);
          return;
        }
      } catch (_) { /* ignore */ }

      // Priority 2: Xrm global context theme detection
      try {
        var xrm = window.parent && window.parent.Xrm ? window.parent.Xrm : window.Xrm;
        if (xrm && xrm.Utility && xrm.Utility.getGlobalContext) {
          var ctx = xrm.Utility.getGlobalContext();
          if (ctx && typeof ctx.getCurrentTheme === 'function') {
            var theme = ctx.getCurrentTheme();
            if (theme && theme.name && theme.name.toLowerCase().indexOf('dark') !== -1) {
              document.documentElement.setAttribute('data-theme', 'dark');
              return;
            }
          }
        }
      } catch (_) { /* cross-origin or Xrm unavailable */ }

      // Priority 3: Parent frame background luminance check
      try {
        var parentBody = window.parent && window.parent.document ? window.parent.document.body : null;
        if (parentBody) {
          var bg = window.parent.getComputedStyle(parentBody).backgroundColor;
          var m = bg.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
          if (m) {
            var lum = 0.299 * parseInt(m[1]) + 0.587 * parseInt(m[2]) + 0.114 * parseInt(m[3]);
            document.documentElement.setAttribute('data-theme', lum < 128 ? 'dark' : 'light');
            return;
          }
        }
      } catch (_) { /* cross-origin */ }

      // Fallback: default to light (matches most Dataverse deployments)
      document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
