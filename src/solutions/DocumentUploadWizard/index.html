<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Documents</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* 100vh fills the iframe viewport in Dataverse dialogs; 100% alone does not */
    html, body { width: 100%; height: 100vh; overflow: hidden; }
    #root { width: 100%; height: 100%; }
  </style>
  <script>
    /**
     * Theme detection — resolve Dataverse dark/light mode before React mounts.
     * Sets data-theme attribute on <html> for downstream FluentProvider selection.
     *
     * Priority:
     *   1. Xrm.Utility.getGlobalContext().getCurrentTheme() (Dataverse runtime)
     *   2. prefers-color-scheme media query (standalone / dev)
     */
    (function detectTheme() {
      try {
        var xrm = window.parent && window.parent.Xrm ? window.parent.Xrm : window.Xrm;
        if (xrm && xrm.Utility && xrm.Utility.getGlobalContext) {
          var ctx = xrm.Utility.getGlobalContext();
          if (ctx && typeof ctx.getCurrentTheme === 'function') {
            var theme = ctx.getCurrentTheme();
            if (theme && theme.name && theme.name.toLowerCase().indexOf('dark') !== -1) {
              document.documentElement.setAttribute('data-theme', 'dark');
              return;
            }
          }
        }
      } catch (_) { /* cross-origin or Xrm unavailable */ }

      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script src="bundle.js"></script>
</body>
</html>
