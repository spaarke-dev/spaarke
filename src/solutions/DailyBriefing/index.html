<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Briefing</title>
    <style>
      /* Reset styles for Dataverse modal dialog context */

      /* Box-sizing reset — REQUIRED per docs/guides/DATAGRID-CODE-PAGE-HOST-CONTRACT.md §2.
       * Without it, embedded DataGrid cells render +24px wider than declared
       * (content-box adds 12+12 padding). Backfilled 2026-06-09. */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      /* Allow scroll but hide scrollbar chrome */
      #root {
        overflow: auto;
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE/Edge */
      }
      #root::-webkit-scrollbar {
        display: none; /* Chrome/Safari */
      }
      /* Ensure Fluent provider fills the container */
      #root > div {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
