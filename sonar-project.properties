# SonarCloud Configuration for Spaarke Repository
# https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/
#
# Organization: spaarke-dev (GitHub organization)
# Project: spaarke-dev_spaarke
#
# Quality gate is advisory-only during Phase 2.
# Blocking enforcement enabled in Task 040 (Phase 3 graduation).

sonar.projectKey=spaarke-dev_spaarke
sonar.organization=spaarke-dev
sonar.projectName=Spaarke

# Source directories
sonar.sources=src
sonar.tests=tests

# Source encoding
sonar.sourceEncoding=UTF-8

# SCM provider
sonar.scm.provider=git

# Exclusions — files NOT analyzed by SonarCloud
sonar.exclusions=\
  src/solutions/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/out/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/*_generated.*,\
  **/Migrations/**,\
  **/obj/**,\
  **/bin/**,\
  **/*.Designer.cs

# Test exclusions
sonar.test.exclusions=\
  tests/**/*Tests.cs,\
  tests/**/*Spec.ts,\
  tests/**/*.test.ts,\
  tests/**/*.test.tsx

# Coverage reports — Coverlet OpenCover format
# Generated by: dotnet test --collect:"XPlat Code Coverage" --settings config/coverlet.runsettings
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# TypeScript/JavaScript coverage (lcov)
sonar.javascript.lcov.reportPaths=**/lcov.info

# Duplicate detection — ignore test files
sonar.cpd.exclusions=\
  tests/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.Tests.cs
